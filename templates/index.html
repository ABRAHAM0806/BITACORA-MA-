<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Ubicación de Maestros</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>

        body{
            background:#f2fbf5;
            font-family:Arial;
            padding:20px;
        }

        .container{
            max-width:500px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .logo{
            text-align:center;
            margin-bottom:10px;
        }

        .logo img{
            width:180px;
        }

        h2{
            text-align:center;
        }

        input,
        select,
        button{
            width:100%;
            padding:10px;
            margin-top:10px;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            background:#198754;
            color:white;
            border:none;
            cursor:pointer;
        }

        .tarjeta{
            margin-top:15px;
            padding:15px;
            background:#f7f7f7;
            border-left:5px solid #198754;
            border-radius:10px;
        }

        .sin{
            text-align:center;
            color:red;
            margin-top:20px;
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="/static/UDL_LogotipoColor.png">
        </div>

        <h2>BITÁCORA DIGITAL</h2>

        <form method="post" action="/buscar">

            <input
                type="text"
                name="matricula"
                placeholder="Matrícula"
                required
            >

            <select name="dia" required>

                <option value="">Seleccione día</option>

                <option value="lunes">Lunes</option>
                <option value="martes">Martes</option>
                <option value="miercoles">Miércoles</option>
                <option value="jueves">Jueves</option>
                <option value="viernes">Viernes</option>

            </select>

            <button type="submit">
                Buscar
            </button>

        </form>

        {% if resultados %}

            {% for r in resultados %}

                <div class="tarjeta">

                    <div>
                        <strong>Hora:</strong>
                        {{ r.hora }}
                    </div>

                    <div>
                        <strong>Aula:</strong>
                        {{ r.aula }}
                    </div>

                    <div>
                        <strong>Grupo:</strong>
                        {{ r.grupo }}
                    </div>

                    <div>
                        <strong>Licenciatura:</strong>
                        {{ r.licenciatura }}
                    </div>

                </div>

            {% endfor %}

        {% elif resultados == [] %}

            <div class="sin">
                No tiene clases ese día
            </div>

        {% endif %}

    </div>

</body>

</html>
