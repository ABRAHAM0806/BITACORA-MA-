<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Ubicación de Maestros</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- PWA -->
    <meta name="theme-color" content="#198754">
    <link rel="manifest" href="/static/manifest.json">

    <style>

        body{
            background:#f2fbf5;
            font-family:Arial, sans-serif;
            padding:20px;
            margin:0;
        }

        .container{
            max-width:520px;
            margin:auto;
            background:white;
            padding:22px;
            border-radius:16px;
            box-shadow:0 0 15px rgba(0,0,0,0.08);
        }

        .logo{
            text-align:center;
            margin-bottom:15px;
        }

        .logo img{
            width:180px;
            max-width:100%;
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#198754;
        }

        input,
        select,
        button{
            width:100%;
            padding:12px;
            margin-top:10px;
            border-radius:10px;
            border:1px solid #ccc;
            box-sizing:border-box;
            font-size:15px;
        }

        button{
            background:#198754;
            color:white;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            opacity:0.95;
        }

        .tarjeta{
            margin-top:15px;
            padding:15px;
            background:#f7f7f7;
            border-left:5px solid #198754;
            border-radius:10px;
        }

        .tarjeta div{
            margin-bottom:5px;
        }

        .sin{
            text-align:center;
            color:#c62828;
            margin-top:20px;
            font-weight:bold;
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- LOGO -->
        <div class="logo">
            <img src="/static/UDL_LogotipoColor.png" alt="Logo UDL">
        </div>

        <h2>📍 BITÁCORA DIGITAL</h2>

        <!-- FORMULARIO -->
        <form method="post" action="/buscar">

            <input
                type="text"
                name="matricula"
                placeholder="Matrícula"
                required
            >

            <select name="dia" required>

                <option value="">Seleccione día</option>

                <option value="lunes">Lunes</option>
                <option value="martes">Martes</option>
                <option value="miercoles">Miércoles</option>
                <option value="jueves">Jueves</option>
                <option value="viernes">Viernes</option>

            </select>

            <button type="submit">
                Buscar
            </button>

        </form>

        <!-- RESULTADOS -->
        {% if resultados %}

            {% for r in resultados %}

                <div class="tarjeta">

                    <div>
                        ⏰ <strong>{{ r.hora }}</strong>
                    </div>

                    <div>
                        🏫 Aula:
                        <strong>{{ r.aula }}</strong>
                    </div>

                    <div>
                        👥 Grupo:
                        <strong>{{ r.grupo }}</strong>
                    </div>

                    <div>
                        🎓
                        <strong>{{ r.licenciatura }}</strong>
                    </div>

                </div>

            {% endfor %}

        {% elif resultados == [] %}

            <div class="sin">
                No tiene clases ese día
            </div>

        {% endif %}

    </div>

    <!-- SERVICE WORKER -->
    <script>

        if ("serviceWorker" in navigator) {

            navigator.serviceWorker.register("/static/sw.js");

        }

    </script>

</body>

</html>
